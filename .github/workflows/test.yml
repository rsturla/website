name: Test

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install devbox
        uses: jetpack-io/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # 0.15.0
        with:
          enable-cache: true

      - name: Build
        run: devbox run -- hugo
